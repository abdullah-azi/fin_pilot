name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: finpilot
          POSTGRES_DB: finpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finpilot -d finpilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://finpilot:finpilot@localhost:5432/finpilot
      TEST_DATABASE_URL: postgresql+psycopg://finpilot:finpilot@localhost:5432/finpilot_test
      JWT_SECRET_KEY: github-actions-secret-key-for-tests
      AI_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
